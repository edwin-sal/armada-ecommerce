<!DOCTYPE html>

<body>
	<header>
		<div class="header-content">
			<button class="sidebar-button" id="sidebar-button">
				<img src="./images/icons/menu.svg" alt="Hamburger menu">
			</button>

			<a href="./index.html">
				<img class="header-logo" src="./images/logos/logo_transparent.png" alt="Bang & bang logo">
			</a>

			<form id="search-form" class="search-bar">
				<input id="search-input" type="text" placeholder="Find your perfect firearm">
				<button type="submit">
					<img src="./images/icons/search.svg" alt="Search icon">
				</button>
			</form>

			<a class="cart-link" href="#">
				<img src="./images/icons/cart.svg" alt="Shopping cart icon">
				<span>0</span>
			</a>

			<div class="profile-container">
				<button class="profile-rounded" id="profile-name">ES</button>
				<button id="logout">
					Logout
					<img src="./images/icons/logout.svg" alt="Logout icon">
				</button>
			</div>
			
			<button id="login">Login</button>
			<button id="signup">Signup</button>
		</div>
	</header>

	<main>
		<aside id="sidebar" data-state="show">
			<ul class="filter-container">
				<li class="dropdown">
					<button class="dropdown-button" data-current-mode="show" data-type="category" data-add-src="add_pink.svg" data-remove-src="remove_pink.svg">
						Category
						<img src="./images/icons/remove_pink.svg" alt="Add icon">
					</button>
					
				</li>
				<li class="category-items">
					<label for="all">
						<input type="radio" id="all" name="category" value="all" checked>
						All
					</label>

					<label for="revolver">
						<input type="radio" id="revolver" name="category" value="revolver">
						Revolver
					</label>

					<label for="pistol">
						<input type="radio" id="pistol" name="category" value="pistol">
						Pistol
					</label>

					<label for="shotgun">
						<input type="radio" id="shotgun" name="category" value="shotgun">
						Shotgun
					</label>

					<label for="submachine-gun">
						<input type="radio" id="submachine-gun" name="category" value="submachine-gun">
						Submachine gun
					</label>

					<label for="assault-rifle">
						<input type="radio" id="assault-rifle" name="category" value="assault-rifle">
						Assault rifle
					</label>

					<label for="sniper-rifle">
						<input type="radio" id="sniper-rifle" name="category" value="sniper-rifle">
						Sniper rifle
					</label>
				</li>	

				<li class="dropdown">
					<button class="dropdown-button" data-current-mode="show" data-type="price" data-add-src="add_pink.svg" data-remove-src="remove_pink.svg">
						Price
						<img src="./images/icons/remove_pink.svg" alt="Add icon">
					</button>
				</li>
				<li class="price-items">
					<label for="randopm-price">
						<input type="radio" id="randopm-price" name="price-sort" value="random-price" checked>
						Random
					</label>

					<label for="low-to-high">
						<input type="radio" id="low-to-high" name="price-sort" value="low-to-high">
						Low to High
					</label>

					<label for="high-to-low">
						<input type="radio" id="high-to-low" name="price-sort" value="high-to-low">
						High to Low
					</label>

						.308
					</label> -->
				</li>
			</ul>
		</aside>

		<div class="modal-backdrop" id="auth-modal">
			<div class="modal">
				<div class="modal-header">
					<h2 class="modal-title">Welcome to Beng & Beng</h2>
					<button class="close-button" id="close-modal">&times;</button>
				</div>
				
				<div class="modal-tabs">
					<div class="tab login-tab active" id="login-tab">Login</div>
					<div class="tab signup-tab" id="signup-tab">Signup</div>
				</div>
				
				<div class="modal-content">
					<div id="login-content" class="tab-content active">
						<form id="login-form">
							<div class="form-group">
								<label for="login-email">Email</label>
								<input type="email" id="login-email" required>
							</div>
							
							<div class="form-group">
								<label for="login-password">Password</label>
								<input type="password" id="login-password" required>
							</div>
							
							<button type="submit" class="auth-button">Login</button>
							
							<div class="forgotten-password">
								<a href="#">Forgot your password?</a>
							</div>
							
							<div class="signup-note">
								Don't have an account? <a href="#" id="switch-to-signup">Sign up</a>
							</div>
						</form>
					</div>
					
					<div id="signup-content" class="tab-content">
						<form id="signup-form">
							<div class="form-group">
								<label for="signup-name">Full Name</label>
								<input type="text" id="signup-name" required>
							</div>
							
							<div class="form-group">
								<label for="signup-email">Email</label>
								<input type="email" id="signup-email" required>
							</div>
							
							<div class="form-group">
								<label for="signup-password">Password</label>
								<input type="password" id="signup-password" required minlength="8">
							</div>
							
							<div class="form-group">
								<label for="signup-confirm">Confirm Password</label>
								<input type="password" id="signup-confirm" required minlength="8">
							</div>
							
							<button type="submit" class="auth-button">Create Account</button>
							
							
							<div class="signup-note">
								Already have an account? <a href="#" id="switch-to-login">Log in</a>
							</div>
						</form>
					</div>
				</div>
			</div>
