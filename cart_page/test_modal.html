<!DOCTYPE html>
 <html lang="en">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Payment Modal</title>
   <style>
     @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');
 
     * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
     }
     
     body {
       font-family: "Noto Sans", sans-serif;
       background-color: #f5f5f5;
       display: flex;
       justify-content: center;
       align-items: center;
       min-height: 100vh;
       padding: 20px;
     }
     
     .overlay {
       position: fixed;
       top: 0;
       left: 0;
       right: 0;
       bottom: 0;
       background-color: rgba(0, 0, 0, 0.4);
       display: flex;
       align-items: center;
       justify-content: center;
     }
     
     .modal {
       background-color: white;
       border-radius: 12px;
       width: 100%;
       max-width: 480px;
       box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
       overflow: hidden;
     }
     
     .modal-header {
       position: relative;
       padding: 20px;
       display: flex;
       align-items: center;
       justify-content: space-between;
     }
     
     .close-button {
       position: absolute;
       right: 20px;
       top: 20px;
       background: none;
       border: none;
       cursor: pointer;
       font-size: 24px;
       color: #ccc;
       aria-label: "Close";
     }
     
     .payment-logos {
       display: flex;
       align-items: center;
       gap: 10px;
     }
     
     .company-logo {
       width: 90px;
       height: 50px;
       display: flex;
       align-items: center;
       justify-content: center;
       margin: 0px 20px 0px 0px;
     }
 
     .company-logo img {
         width: 80px;
     }
     
     .card-logo {
       height: 30px;
     }
     
     .modal-body {
       padding: 0 20px 20px;
     }
     
     .card-details {
       margin-bottom: 20px;
     }
     
     .card-details h2 {
       color: #2b1b19;
       font-size: 18px;
       margin-bottom: 20px;
       font-weight: 500;
     }
     
     .form-group {
       margin-bottom: 15px;
     }
     
     .form-control {
       width: 100%;
       padding: 12px 15px;
       border: 1px solid #e0e0e0;
       border-radius: 8px;
       font-size: 16px;
     }
     
     .form-row {
       display: flex;
       gap: 15px;
     }
     
     .form-row .form-group {
       flex: 1;
     }
     
     .modal-footer {
       padding: 20px;
       border-top: 1px solid #f0f0f0;
     }
     
     .total-section {
       display: flex;
       justify-content: space-between;
       margin-bottom: 20px;
       align-items: center;
     }
     
     .total-label {
       color: #888;
       font-size: 16px;
     }
     
     .total-amount {
       color: #2b1b19;
       font-size: 24px;
       font-weight: 500;
     }
     
     .pay-button {
       width: 100%;
       padding: 15px;
       background-color: #2b1b19;
       color: white;
       border: none;
       border-radius: 8px;
       font-size: 16px;
       font-weight: 500;
       cursor: pointer;
       transition: background-color 0.2s;
     }
     
     .pay-button:hover {
       background-color: #ff9e95;
     }
   </style>
 </head>
 <body>
   <div class="overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
     <main class="modal">
       <header class="modal-header">
         <div class="payment-logos">
           <div class="company-logo">
             <img src="images/logos/logo_vertical.png" alt="Beng & Beng Logo">
           </div>
           <img class="card-logo" src="images/logos/visa.jpg" alt="Visa">
           <img class="card-logo" src="images/logos/mastercard.png" alt="Mastercard">
         </div>
         <button class="close-button" aria-label="Close">&times;</button>
       </header>
       
       <section class="modal-body">
         <form class="card-details" id="payment-form">
           <h2 id="modal-title">Card Details</h2>
           <div class="form-group">
             <input type="text" id="card-name" class="form-control" placeholder="Card Name" required>
           </div>
           <div class="form-group">
             <input type="text" id="card-number" class="form-control" placeholder="Card Number" required pattern="[0-9]*" inputmode="numeric">
           </div>
           <div class="form-row">
             <div class="form-group">
               <input type="text" id="expiration" class="form-control" placeholder="Expiration" required>
             </div>
             <div class="form-group">
               <input type="text" id="cvc" class="form-control" placeholder="CVC" required pattern="[0-9]*" inputmode="numeric">
             </div>
           </div>
         </form>
       </section>
       
       <footer class="modal-footer">
         <div class="total-section">
           <span class="total-label">Total Amount</span>
           <span class="total-amount" aria-live="polite">$0</span>
         </div>
         <button type="submit" form="payment-form" class="pay-button">Pay</button>
       </footer>
     </main>
   </div>
 </body>
 </html>
