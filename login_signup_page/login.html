<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beng & Beng - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo-container">
        <img src="asset/logo_transparent.png" alt="beng & beng logo">
    </div>

    <div class="auth-container">
        <div class="form-container">
            <h2 class="form-title">Welcome back!</h2>
            <p class="auth-message">Not a member yet?<a href="signup.html">Sign up here.</a></p>
            
            <form id="login-form">
                <input id="user-email" type="email" class="form-control" placeholder="Email">
                <input id="user-password" type="password" class="form-control" placeholder="Password">
                
                <!-- <div class="remember-forgot">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>   
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div> -->
                
                <button type="submit" class="btn-auth">Login</button>
            </form>
        </div>
        
        <div class="image-container">
            <img src="asset/guns.jpg" alt="">
        </div>
    </div>

    <p id="warning-msg" class="fade">Invalid Credentials!</p>

    <script type="module" src="../account.js"></script>
    <script type="module" src="./login.js"></script>
</body>
</html>
