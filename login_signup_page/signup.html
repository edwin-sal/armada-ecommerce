<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Shop - Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo-container">
        <img src="asset/logo_transparent.png" alt="beng & beng logo">
    </div>

    <div class="auth-container">
        <div class="form-container">
            <h2 class="form-title">Signup to order.</h2>
            <p class="auth-message">Already a member? <a href="login.html">Login here.</a></p>
            
            <form id="signup-form">
                <input id="first-name" type="text" class="form-control" placeholder="First Name">
                <input id="last-name" type="text" class="form-control" placeholder="Last Name">
                <input id="email" type="email" class="form-control" placeholder="Email">
                <input id="password" type="password" class="form-control" placeholder="Password">
                <input id="confirm-password" type="password" class="form-control" placeholder="Confirm Password">
                <button type="submit" class="btn-auth">Signup</button>
            </form>
        </div>
        
        <div class="image-container">
            <img src="asset/guns.jpg" alt="">
        </div>
    </div>

    <script type="module" src="../account.js"></script>
    <script type="module" src="./signup.js"></script>
</body>
</html>
