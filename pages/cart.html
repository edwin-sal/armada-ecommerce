			</div>

			<a href="../login_signup_page/login.html" id="login-button" class="login">Login</a>

		</section>

		<section class="shipping-container">
			<h2>Shipping Information</h2>
			<form id="shipping-form">
				<div class="name-container">
					<input required type="text" placeholder="Firt Name">
					<input required type="text" placeholder="Last Name">
				</div>

				<input required class="address" type="text" placeholder="Address">
				<input class="address" type="text" placeholder="Address 2">

				<div class="more-address-container">
					<input required type="text" placeholder="City">
					<input required type="text" placeholder="Municipality">
					<input required type="text" placeholder="Zip Code">
				</div>

				<div class="summary-container">
					<h3>Total Summary</h3>

					<p class="items-price-container">
						Items
						<span id="items" class="price">₱8,999</span>
					</p>

					<p class="shipping-fee-price-container">
						Shipping Fee
						<span id="shipping-fee" class="price">FREE</span>
					</p>

					<p class="total-container">
						Total Cost
						<span id="total-cost" class="price">₱9,057</span>
					</p>

					<input class="submit-checkout" type="submit" value="Proceed to Checkout">
				</div>
			</form>
		</section>
	</main>

	<div id="payment-modal" class="overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
		<div class="modal">
			<div class="modal-header">
				<div class="payment-logos">
					<div class="company-logo">
						<img src="../images/logos/logo_transparent.png" alt="Beng & Beng Logo">
					</div>
					<img class="card-logo" src="../images/logos/visa.png" alt="Visa">
					<img class="card-logo" src="../images/logos/mastercard.png" alt="Mastercard">
				</div>
				<button id="close-button" class="close-button" aria-label="Close">&times;</button>
			</div>

			<section class="modal-body">
				<form class="card-details" id="payment-form">
					<h2 id="modal-title">Card Details</h2>
					<div class="form-group">
						<input type="text" id="card-name" class="form-control" placeholder="Card Name" required>
					</div>
					<div class="form-group">
						<input type="text" id="card-number" class="form-control" placeholder="Card Number" required
							pattern="[0-9]*" inputmode="numeric">
					</div>
					<div class="form-row">
						<div class="form-group">
							<input type="text" id="expiration" class="form-control" placeholder="Expiration" required>
						</div>
						<div class="form-group">
							<input type="text" id="cvc" class="form-control" placeholder="CVC" required pattern="[0-9]*"
								inputmode="numeric">
						</div>
					</div>
				</form>
			</section>

			<div class="modal-footer">
				<div class="total-section">
					<span class="total-label">Total Amount</span>
					<span id="ammount-to-pay" class="total-amount" aria-live="polite">₱0</span>
				</div>
				<button type="submit" form="payment-form" class="pay-button">Pay</button>
			</div>
		</div>
	</div>

	<script type="module" src="../scripts/header.js"></script>
