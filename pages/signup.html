<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beng & Beng - Signup</title>
    <link rel="stylesheet" href="../styles/login-signup.css">
</head>
<body>
    <a href="../index.html" class="logo-container">
        <img src="../images/logos/logo_transparent.png" alt="beng & beng logo">
    </a>

    <div class="auth-container">
        <div class="form-container">
            <h2 class="form-title">Signup to order.</h2>
            <p class="auth-message">Already a member? <a href="./login.html">Login here.</a></p>
            
            <form id="signup-form">
                <input id="first-name" type="text" class="form-control" placeholder="First Name">
                <input id="last-name" type="text" class="form-control" placeholder="Last Name">
                <input id="email" type="email" class="form-control" placeholder="Email">
                <input id="password" type="password" class="form-control" placeholder="Password">
                <input id="confirm-password" type="password" class="form-control" placeholder="Confirm Password">
                <button type="submit" class="btn-auth">Signup</button>
            </form>
        </div>
        
        <div class="image-container">
            <img src="../images/assets/guns.jpg" alt="">
        </div>
    </div>
    
    <p id="warning-msg" class="fade">Invalid Credentials!</p>

    <script type="module" src="../scripts/account.js"></script>
    <script type="module" src="../scripts/signup.js"></script>
</body>
</html>
